<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#1F3C5A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Summit 26" />
    <link rel="manifest" href="manifest.json?v=20260325-1" />
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png?v=20260325-1" />
    <link rel="apple-touch-icon" href="icons/icon-192.png?v=20260325-1" />
    <title>Supervisor Summit 2026 App</title>
    <style>
      :root {
        --primary-navy: #1F3C5A;
        --dark-navy: #162C44;
        --accent-gold: #F2B705;
        --white: #FFFFFF;
        --light-gray: #E5E7EB;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        min-height: 100%;
      }

      body {
        min-height: 100dvh;
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(180deg, var(--primary-navy) 0%, var(--dark-navy) 100%);
        color: var(--white);
      }

      .screen {
        width: 100%;
        max-width: 460px;
        min-height: 100dvh;
        margin: 0 auto;
        padding: max(10px, env(safe-area-inset-top)) max(14px, env(safe-area-inset-right)) max(14px, env(safe-area-inset-bottom)) max(14px, env(safe-area-inset-left));
        display: grid;
        gap: 8px;
      }

      .hidden {
        display: none !important;
      }

      .altamonte-header {
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .altamonte-logo {
        width: min(92vw, 420px);
        max-height: 160px;
        object-fit: contain;
        display: block;
      }

      .summit-logo-card {
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.12);
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.18);
        padding: 10px;
        text-align: center;
      }

      .summit-mark {
        margin: 0;
        font-size: clamp(1.3rem, 5.4vw, 1.95rem);
        font-weight: 800;
        line-height: 1.04;
        text-transform: uppercase;
        letter-spacing: -0.01em;
      }

      .event-text {
        text-align: center;
      }

      .event-dates {
        margin: 4px 0 0;
        font-size: 0.98rem;
        color: var(--light-gray);
        font-weight: 700;
      }

      .actions-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .action-btn,
      .back-btn {
        border: 0;
        border-radius: 12px;
        font-family: inherit;
        font-weight: 800;
        cursor: pointer;
      }

      .action-btn {
        min-height: 46px;
        background: var(--accent-gold);
        color: #1A2E47;
        font-size: 0.9rem;
        box-shadow: 0 10px 22px rgba(0, 0, 0, 0.22);
      }

      .back-btn {
        min-height: 42px;
        padding: 8px 12px;
        background: rgba(255, 255, 255, 0.2);
        color: var(--white);
        font-size: 0.88rem;
        width: fit-content;
      }

      .speakers-card {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 16px;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.14);
        padding: 10px;
        min-height: 260px;
        display: grid;
        gap: 8px;
      }

      .speakers-title {
        margin: 0;
        font-size: 1rem;
        font-weight: 800;
        color: var(--white);
      }

      .speakers-list {
        overflow-y: auto;
        max-height: 62dvh;
        display: grid;
        gap: 8px;
        padding-right: 2px;
      }

      .speaker-item {
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.95);
        border: 1px solid rgba(22, 44, 68, 0.12);
        overflow: hidden;
      }

      .speaker-toggle {
        width: 100%;
        display: grid;
        grid-template-columns: 64px 1fr;
        gap: 10px;
        align-items: center;
        text-align: left;
        border: 0;
        background: transparent;
        padding: 10px;
      }

      .speaker-avatar,
      .speaker-avatar-placeholder {
        width: 64px;
        height: 64px;
        border-radius: 50%;
      }

      .speaker-avatar {
        object-fit: cover;
        display: block;
        background: #DDE5F5;
      }

      .speaker-avatar-placeholder {
        display: none;
        align-items: center;
        justify-content: center;
        background: #DDE5F5;
        color: #1F3C5A;
        font-size: 0.75rem;
        font-weight: 700;
      }

      .speaker-name {
        color: #122845;
        font-size: 0.98rem;
        font-weight: 800;
        margin: 0;
      }

      .speaker-details {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.25s ease;
        border-top: 1px solid rgba(22, 44, 68, 0.12);
        background: #F7F9FC;
      }

      .speaker-item.expanded .speaker-details {
        max-height: 340px;
      }

      .speaker-details-inner {
        padding: 12px;
        display: grid;
        gap: 10px;
      }

      .speaker-detail-avatar,
      .speaker-detail-avatar-placeholder {
        width: 120px;
        height: 120px;
        border-radius: 12px;
      }

      .speaker-detail-avatar {
        object-fit: cover;
        display: block;
        background: #DDE5F5;
      }

      .speaker-detail-avatar-placeholder {
        display: none;
        align-items: center;
        justify-content: center;
        background: #DDE5F5;
        color: #1F3C5A;
        font-size: 0.85rem;
        font-weight: 700;
      }

      .speaker-meta {
        color: #223A57;
        margin: 0;
        line-height: 1.35;
      }

      .speaker-bio {
        color: #3B4F68;
        margin: 0;
        line-height: 1.45;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <main class="screen">
      <section id="home-view">
        <header class="altamonte-header" aria-label="Altamonte Springs logo">
          <img class="altamonte-logo" src="icons/altamonte-logo.png?v=20260325-1" alt="Altamonte Springs logo" />
        </header>

        <section class="summit-logo-card" aria-label="Supervisor Summit branding">
          <p class="summit-mark">Supervisor<br />Summit 2026</p>
        </section>

        <section class="event-text" aria-label="Event details">
          <p class="event-dates">May 5–7, 2026</p>
        </section>

        <section class="actions-grid" aria-label="Quick action placeholders">
          <button class="action-btn" type="button" aria-disabled="true">Agenda</button>
          <button id="open-speakers-btn" class="action-btn" type="button">Speakers</button>
          <button class="action-btn" type="button" aria-disabled="true">Locations</button>
          <button class="action-btn" type="button" aria-disabled="true">Food</button>
        </section>
      </section>

      <section id="speakers-view" class="hidden" aria-label="Speakers view">
        <button id="back-home-btn" class="back-btn" type="button">← Back</button>
        <section class="speakers-card" aria-label="Speakers section">
          <h2 class="speakers-title">Speakers</h2>
          <div id="speakers-list" class="speakers-list" aria-live="polite"></div>
        </section>
      </section>
    </main>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('service-worker.js?v=20260325-1').then((registration) => {
            registration.update();

            if (registration.waiting) {
              registration.waiting.postMessage({ type: 'SKIP_WAITING' });
            }

            registration.addEventListener('updatefound', () => {
              const newWorker = registration.installing;
              if (!newWorker) {
                return;
              }

              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  newWorker.postMessage({ type: 'SKIP_WAITING' });
                }
              });
            });
          });
        });

        let hasReloadedForUpdate = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (hasReloadedForUpdate) {
            return;
          }
          hasReloadedForUpdate = true;
          window.location.reload();
        });
      }

      const homeView = document.getElementById('home-view');
      const speakersView = document.getElementById('speakers-view');
      const openSpeakersBtn = document.getElementById('open-speakers-btn');
      const backHomeBtn = document.getElementById('back-home-btn');

      function showHomeView() {
        homeView.classList.remove('hidden');
        speakersView.classList.add('hidden');
      }

      function showSpeakersView() {
        homeView.classList.add('hidden');
        speakersView.classList.remove('hidden');
      }

      async function loadSpeakers() {
        try {
          console.log('Fetching speakers from data/speakers.json');
          const response = await fetch('data/speakers.json');
          if (!response.ok) {
            throw new Error(`Failed to load speakers: ${response.status} (${response.url})`);
          }

          const speakers = await response.json();
          console.log('Speakers loaded:', speakers);

          const sortedSpeakers = [...speakers].sort((a, b) => a.SortOrder - b.SortOrder);
          const listNode = document.getElementById('speakers-list');
          listNode.innerHTML = '';

          sortedSpeakers.forEach((speaker, index) => {
            const item = document.createElement('article');
            item.className = 'speaker-item';

            const toggle = document.createElement('button');
            toggle.className = 'speaker-toggle';
            toggle.type = 'button';
            toggle.setAttribute('aria-expanded', 'false');

            const photoPath = `images/speakers/${speaker.Photo}`;

            const avatar = document.createElement('img');
            avatar.className = 'speaker-avatar';
            avatar.src = photoPath;
            avatar.alt = speaker.DisplayName;
            avatar.loading = 'lazy';

            const avatarFallback = document.createElement('div');
            avatarFallback.className = 'speaker-avatar-placeholder';
            avatarFallback.textContent = 'No Image';

            avatar.onerror = () => {
              avatar.style.display = 'none';
              avatarFallback.style.display = 'flex';
            };

            const name = document.createElement('p');
            name.className = 'speaker-name';
            name.textContent = speaker.DisplayName;

            const details = document.createElement('div');
            details.className = 'speaker-details';

            const detailsInner = document.createElement('div');
            detailsInner.className = 'speaker-details-inner';

            const detailImage = document.createElement('img');
            detailImage.className = 'speaker-detail-avatar';
            detailImage.src = photoPath;
            detailImage.alt = `${speaker.DisplayName} portrait`;
            detailImage.loading = 'lazy';

            const detailFallback = document.createElement('div');
            detailFallback.className = 'speaker-detail-avatar-placeholder';
            detailFallback.textContent = 'No Image';

            detailImage.onerror = () => {
              detailImage.style.display = 'none';
              detailFallback.style.display = 'flex';
            };

            const detailName = document.createElement('p');
            detailName.className = 'speaker-meta';
            detailName.innerHTML = `<strong>${speaker.DisplayName}</strong>`;

            const detailTitleOrg = document.createElement('p');
            detailTitleOrg.className = 'speaker-meta';
            detailTitleOrg.textContent = `${speaker.Title} · ${speaker.Organization}`;

            const detailBio = document.createElement('p');
            detailBio.className = 'speaker-bio';
            detailBio.textContent = speaker.BioShort;

            detailsInner.append(detailImage, detailFallback, detailName, detailTitleOrg, detailBio);
            details.append(detailsInner);

            const textWrap = document.createElement('div');
            textWrap.append(name);

            toggle.append(avatar, avatarFallback, textWrap);
            item.append(toggle, details);
            listNode.append(item);

            toggle.addEventListener('click', () => {
              const expandedItem = document.querySelector('.speaker-item.expanded');
              if (expandedItem && expandedItem !== item) {
                expandedItem.classList.remove('expanded');
                const expandedToggle = expandedItem.querySelector('.speaker-toggle');
                if (expandedToggle) {
                  expandedToggle.setAttribute('aria-expanded', 'false');
                }
              }

              const isNowExpanded = item.classList.toggle('expanded');
              toggle.setAttribute('aria-expanded', isNowExpanded ? 'true' : 'false');
            });

            if (index === 0) {
              item.classList.add('expanded');
              toggle.setAttribute('aria-expanded', 'true');
            }
          });
        } catch (error) {
          console.error('Speaker load error:', error);
          const listNode = document.getElementById('speakers-list');
          if (listNode) {
            listNode.innerHTML = '<div class="speaker-item" style="padding:12px;color:#223A57;font-weight:700;">Unable to load speakers right now.</div>';
          }
        }
      }

      openSpeakersBtn.addEventListener('click', () => {
        showSpeakersView();
        loadSpeakers();
      });

      backHomeBtn.addEventListener('click', showHomeView);

      showHomeView();
    </script>
  </body>
</html>
