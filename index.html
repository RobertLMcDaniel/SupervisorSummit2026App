<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#1e2f73" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Summit 26" />
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <title>Supervisor Summit 2026 App</title>
    <style>
      :root {
        --navy: #1e2f73;
        --navy-soft: #324791;
        --gold: #f4c20d;
        --white: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        min-height: 100%;
      }

      body {
        min-height: 100dvh;
        display: grid;
        place-items: center;
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(180deg, var(--navy) 0%, #18275f 100%);
        color: var(--white);
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
        touch-action: manipulation;
      }

      main {
        width: 100%;
        max-width: 460px;
        margin: 0 auto;
        padding: max(24px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(30px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
        text-align: center;
      }

      .logo-wrap {
        width: min(100%, 306px);
        margin: 0 auto 30px;
      }

      .logo {
        width: 100%;
        height: auto;
        display: block;
        background: transparent;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.05rem, 8vw, 3.2rem);
        line-height: 1;
        letter-spacing: -0.02em;
      }

      .tagline {
        margin: 14px 0 30px;
        font-size: 1.04rem;
        color: rgba(255, 255, 255, 0.85);
      }

      .schedule-list {
        width: 100%;
        display: grid;
        gap: 14px;
        margin: 0 auto;
      }

      .schedule-button {
        width: 100%;
        border: 0;
        border-radius: 20px;
        padding: 20px 18px;
        background: var(--white);
        color: var(--navy);
        text-align: left;
        box-shadow: 0 14px 30px rgba(0, 0, 0, 0.2);
      }

      .schedule-title {
        display: block;
        font-size: 1.1rem;
        font-weight: 700;
      }

      .schedule-subtitle {
        display: block;
        margin-top: 8px;
        color: var(--navy-soft);
        line-height: 1.4;
      }

      .schedule-date {
        color: #5e74b8;
      }

      .accent-strip {
        width: 72px;
        height: 6px;
        border-radius: 999px;
        margin: 0 auto 24px;
        background: var(--gold);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="logo-wrap">
        <img class="logo" src="icons/altamonte-logo.png" alt="Altamonte logo" draggable="false" />
      </div>
      <div class="accent-strip" aria-hidden="true"></div>
      <h1>Supervisor Summit 26</h1>
      <p class="tagline">Supervisors Bring the Weather</p>

      <section class="schedule-list" aria-label="Schedule buttons">
        <button class="schedule-button" type="button">
          <span class="schedule-title">Day 1 Schedule</span>
          <span class="schedule-subtitle">Tuesday <span class="schedule-date">May 5th</span></span>
        </button>
        <button class="schedule-button" type="button">
          <span class="schedule-title">Day 2 Schedule</span>
          <span class="schedule-subtitle">Wednesday <span class="schedule-date">May 6th</span></span>
        </button>
        <button class="schedule-button" type="button">
          <span class="schedule-title">Day 3 Schedule</span>
          <span class="schedule-subtitle">Thursday <span class="schedule-date">May 7th</span></span>
        </button>
      </section>
    </main>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('service-worker.js?v=20260324-1');
        });
      }
    </script>
  </body>
</html>
