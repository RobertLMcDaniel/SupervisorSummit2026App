<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#1F3C5A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Summit 26" />
    <link rel="manifest" href="manifest.json?v=20260324-2" />
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png?v=20260324-2" />
    <link rel="apple-touch-icon" href="icons/icon-192.png?v=20260324-2" />
    <title>Supervisor Summit 2026 App</title>
    <style>
      :root {
        --primary-navy: #1F3C5A;
        --dark-navy: #162C44;
        --accent-gold: #F2B705;
        --white: #FFFFFF;
        --light-gray: #E5E7EB;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        min-height: 100%;
      }

      body {
        min-height: 100dvh;
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(180deg, var(--primary-navy) 0%, var(--dark-navy) 100%);
        color: var(--white);
      }

      .screen {
        width: 100%;
        max-width: 460px;
        min-height: 100dvh;
        margin: 0 auto;
        padding: max(14px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(20px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
        display: grid;
        grid-template-rows: auto auto auto 1fr;
        gap: 12px;
      }

      .altamonte-header {
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .altamonte-logo {
        width: min(78vw, 300px);
        max-height: 92px;
        object-fit: contain;
        display: block;
      }

      .summit-logo-card {
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.12);
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.18);
        padding: 14px;
        text-align: center;
      }

      .summit-mark {
        margin: 0;
        font-size: clamp(1.45rem, 6vw, 2.1rem);
        font-weight: 800;
        line-height: 1.04;
        text-transform: uppercase;
        letter-spacing: -0.01em;
      }

      .event-text {
        text-align: center;
      }

      .event-title {
        margin: 0;
        font-size: clamp(1.35rem, 5.5vw, 1.8rem);
        font-weight: 800;
      }

      .event-dates {
        margin: 6px 0 0;
        font-size: 0.95rem;
        color: var(--light-gray);
        font-weight: 700;
      }

      .actions-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .action-btn {
        border: 0;
        border-radius: 14px;
        font-family: inherit;
        font-weight: 800;
        cursor: pointer;
      }

      .action-btn {
        min-height: 60px;
        background: var(--accent-gold);
        color: #1a2e47;
        font-size: 1rem;
        box-shadow: 0 10px 22px rgba(0, 0, 0, 0.22);
      }

    </style>
  </head>
  <body>
    <main class="screen">
      <header class="altamonte-header" aria-label="Altamonte Springs logo">
        <img class="altamonte-logo" src="icons/altamonte-logo.png?v=20260324-2" alt="Altamonte Springs logo" />
      </header>

      <section class="summit-logo-card" aria-label="Supervisor Summit branding">
        <p class="summit-mark">Supervisor<br />Summit 2026</p>
      </section>

      <section class="event-text" aria-label="Event details">
        <p class="event-dates">May 5–7, 2026</p>
      </section>

      <section class="actions-grid" aria-label="Quick action placeholders">
        <button class="action-btn" type="button" aria-disabled="true">Agenda</button>
        <button class="action-btn" type="button" aria-disabled="true">Speakers</button>
        <button class="action-btn" type="button" aria-disabled="true">Locations</button>
        <button class="action-btn" type="button" aria-disabled="true">Food</button>
      </section>

    </main>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('service-worker.js?v=20260324-2').then((registration) => {
            registration.update();

            if (registration.waiting) {
              registration.waiting.postMessage({ type: 'SKIP_WAITING' });
            }

            registration.addEventListener('updatefound', () => {
              const newWorker = registration.installing;
              if (!newWorker) {
                return;
              }

              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  newWorker.postMessage({ type: 'SKIP_WAITING' });
                }
              });
            });
          });
        });

        let hasReloadedForUpdate = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (hasReloadedForUpdate) {
            return;
          }
          hasReloadedForUpdate = true;
          window.location.reload();
        });
      }
    </script>
  </body>
</html>
