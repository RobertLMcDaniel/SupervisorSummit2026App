<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#112356" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Summit 26" />
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <title>Supervisor Summit 2026 App</title>
    <style>
      :root {
        --navy: #112356;
        --navy-soft: #1b3274;
        --gold: #f0c460;
        --white: #ffffff;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, Helvetica, sans-serif;
        background: var(--navy);
        color: var(--white);
      }

      main {
        width: min(100%, 460px);
        padding: 28px 22px 40px;
        text-align: center;
      }

      .logo {
        width: min(100%, 306px);
        height: auto;
        display: block;
        margin: 0 auto 28px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.08);
      }

      h1 {
        margin: 0;
        font-size: clamp(2.1rem, 8vw, 3.4rem);
        line-height: 1;
      }

      .tagline {
        margin: 14px 0 28px;
        font-size: 1.05rem;
        color: rgba(255, 255, 255, 0.82);
      }

      .schedule-list {
        display: grid;
        gap: 14px;
      }

      .schedule-button {
        border: 0;
        border-radius: 20px;
        padding: 20px 18px;
        background: var(--white);
        color: var(--navy);
        text-align: left;
        box-shadow: 0 14px 30px rgba(0, 0, 0, 0.18);
      }

      .schedule-title {
        display: block;
        font-size: 1.1rem;
        font-weight: 700;
      }

      .schedule-subtitle {
        display: block;
        margin-top: 8px;
        color: var(--navy-soft);
        line-height: 1.4;
      }

      .schedule-date {
        color: #556ca9;
      }
    </style>
  </head>
  <body>
    <main>
      <img class="logo" src="icons/altamonte-logo.png" alt="Altamonte logo" />
      <h1>Supervisor Summit 26</h1>
      <p class="tagline">Supervisors Bring the Weather</p>

      <section class="schedule-list" aria-label="Schedule buttons">
        <button class="schedule-button" type="button">
          <span class="schedule-title">Day 1 Schedule</span>
          <span class="schedule-subtitle">Tuesday <span class="schedule-date">May 5th</span></span>
        </button>
        <button class="schedule-button" type="button">
          <span class="schedule-title">Day 2 Schedule</span>
          <span class="schedule-subtitle">Wednesday <span class="schedule-date">May 6th</span></span>
        </button>
        <button class="schedule-button" type="button">
          <span class="schedule-title">Day 3 Schedule</span>
          <span class="schedule-subtitle">Thursday <span class="schedule-date">May 7th</span></span>
        </button>
      </section>
    </main>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('service-worker.js?v=20260324-1');
        });
      }
    </script>
  </body>
</html>
